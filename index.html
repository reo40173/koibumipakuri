<script>
  const targets = ['fumi', 'tomo', 'yori', 'posuto'];
  let current = 0;

  function showChara(index) {
    current = (index + targets.length) % targets.length;

    document.querySelectorAll('.thumb-btn').forEach((b, i) => {
      b.classList.toggle('active', i === current);
    });
    document.querySelectorAll('.chara-card').forEach((c, i) => {
      c.classList.toggle('active', i === current);
    });
  }

  // アイコンクリック
  document.querySelectorAll('.thumb-btn').forEach((btn, i) => {
    btn.addEventListener('click', () => showChara(i));
  });

  // 矢印クリック
  document.getElementById('arrowLeft').addEventListener('click', () => showChara(current - 1));
  document.getElementById('arrowRight').addEventListener('click', () => showChara(current + 1));
</script>
